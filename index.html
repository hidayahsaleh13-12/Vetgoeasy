<!-- Kalkulator Dos Dengan Pilihan Unit -->
<div id="calcBox">
    <h3 style="color:white; text-shadow:none;">Kalkulator Dos <span id="activeMed"></span></h3>
    
    <label>Berat Haiwan (kg):</label><br>
    <input type="number" id="weight" placeholder="0"> kg<br>
    
    <label>Dos Diperlukan (mg/kg):</label><br>
    <input type="number" id="dosage" placeholder="cth: 5"> mg/kg<br>

    <label>Pilih Unit Kepekatan:</label><br>
    <select id="unitType" onchange="updatePlaceholder()" style="padding:5px; border-radius:5px; margin-bottom:10px; font-weight:bold;">
        <option value="mgml">mg/ml</option>
        <option value="percent">% (Peratus)</option>
    </select><br>

    <input type="number" id="strength" placeholder="cth: 100"> <span id="unitLabel">mg/ml</span><br>
    
    <button class="btn" style="background:#4caf50; margin-top:15px;" onclick="calculate()">KIRA SEKARANG</button>
    
    <div style="background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; margin-top:15px;">
        <span style="font-size:0.9em;">KEPUTUSAN:</span>
        <span class="result-display" id="finalResult">0.00 ml</span>
    </div>
</div>

<script>
    let selectedSymptoms = [];
    const medData = {
        'Cacing': ['Ivermectin', 'Albendazole', 'Zantel'],
        'Selsema': ['Oxytetracycline LA', 'Doxycycline', 'Enrofloxacin'],
        'Kulit': ['Ketoconazole', 'Spot-on Treatment', 'Amitraz'],
        'Cirit': ['Kaolin-Pectin', 'Charcoal Suspension', 'Sulpha-Q']
    };

    // Fungsi tukar placeholder mengikut unit pilihan
    function updatePlaceholder() {
        const type = document.getElementById('unitType').value;
        const input = document.getElementById('strength');
        const label = document.getElementById('unitLabel');
        
        if(type === "percent") {
            input.placeholder = "cth: 1";
            label.innerText = "%";
        } else {
            input.placeholder = "cth: 10";
            label.innerText = "mg/ml";
        }
    }

    function openClinic(animal) {
        document.getElementById('title').innerText = "Simptom " + animal;
        document.getElementById('clinicModal').style.display = "block";
        resetAll();
    }

    function closeModal() { document.getElementById('clinicModal').style.display = "none"; }

    function toggleSym(el, sym) {
        el.classList.toggle('active');
        if (selectedSymptoms.includes(sym)) {
            selectedSymptoms = selectedSymptoms.filter(s => s !== sym);
        } else {
            selectedSymptoms.push(sym);
        }
    }

    function generateMeds() {
        const container = document.getElementById('medOptions');
        container.innerHTML = "";
        if(selectedSymptoms.length === 0) return alert("Sila pilih simptom dahulu!");

        selectedSymptoms.forEach(s => {
            medData[s].forEach(m => {
                let div = document.createElement('div');
                div.className = 'med-item';
                div.innerText = m;
                div.onclick = () => showCalc(m);
                container.appendChild(div);
            });
        });
        document.getElementById('medListSection').style.display = "block";
    }

    function showCalc(medName) {
        document.getElementById('calcBox').style.display = "block";
        document.getElementById('activeMed').innerText = "- " + medName;
        document.getElementById('calcBox').scrollIntoView({behavior: "smooth"});
    }

    function calculate() {
        const w = parseFloat(document.getElementById('weight').value);
        const d = parseFloat(document.getElementById('dosage').value);
        let s = parseFloat(document.getElementById('strength').value);
        const type = document.getElementById('unitType').value;

        // Jika user pilih %, tukar ke mg/ml (Darab 10)
        if(type === "percent") {
            s = s * 10;
        }

        if(w > 0 && d > 0 && s > 0) {
            const res = (w * d) / s;
            const finalRes = res.toFixed(2);
            document.getElementById('finalResult').innerText = finalRes + " ml";
            
            // Pop-up jawapan
            alert("JUMLAH UBAT: " + finalRes + " ml\n\n(Formula: " + w + "kg x " + d + "mg/kg ÷ " + s + "mg/ml)");
        } else {
            alert("Sila masukkan semua maklumat dengan betul.");
        }
    }

    // Fungsi sokongan Enter Key
    window.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            calculate();
        }
    });

    function resetAll() {
        selectedSymptoms = [];
        document.querySelectorAll('.sym-box').forEach(b => b.classList.remove('active'));
        document.getElementById('medListSection').style.display = "none";
        document.getElementById('calcBox').style.display = "none";
        document.getElementById('finalResult').innerText = "0.00 ml";
        document.querySelectorAll('input').forEach(i => i.value = "");
    }
</script>
