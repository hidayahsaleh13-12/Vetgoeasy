<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Veterinar Pintar</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1, h2, h3 {
            color: #0d47a1;
            text-shadow: 0 0 10px rgba(13, 71, 161, 0.3);
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        .main-container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        input[type="text"] {
            border: 3px solid #0d47a1;
            padding: 12px;
            border-radius: 15px;
            width: 80%;
            font-weight: bold;
            color: #0d47a1;
            outline: none;
        }

        .animal-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 55px;
            margin: 20px 0;
        }

        .animal-icon { cursor: pointer; transition: 0.3s; }
        .animal-icon:hover { transform: scale(1.3); }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(13, 71, 161, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #f0f8ff;
            margin: 5% auto;
            padding: 25px;
            border: 5px solid #0d47a1;
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            box-shadow: 0 0 30px #0d47a1;
        }

        /* CUSTOM POP-UP JAWAPAN */
        #customAlert {
            display: none;
            position: fixed;
            z-index: 200;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background-color: #e3f2fd;
            border: 4px solid #0d47a1;
            box-shadow: 0 0 20px #0d47a1;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
        }

        #customAlert h2 {
            color: #0d47a1;
            font-weight: bold;
            margin-top: 0;
            text-shadow: 0 0 8px rgba(13, 71, 161, 0.2);
        }

        #alertMessage {
            color: #0d47a1;
            font-weight: bold;
            font-size: 24px;
            margin: 20px 0;
        }

        .symptom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .sym-box {
            background: white;
            border: 2px solid #0d47a1;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #0d47a1;
            text-align: center;
        }

        .sym-box.active { background: #0d47a1; color: white; }

        .med-item {
            background: #bbdefb;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #0d47a1;
            border-left: 6px solid #0d47a1;
            text-align: left;
        }

        #calcArea {
            background: #0d47a1;
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            display: none;
        }

        .input-row { margin-bottom: 15px; text-align: left; }
        .input-row input { 
            width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; box-sizing: border-box; margin-top: 5px;
        }

        .btn {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-kira { background: #4caf50; }
        .btn-tutup { background: #f44336; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>VET CALCULATOR PRO</h1>
    <div style="margin-bottom: 20px;">
        <p style="color: #0d47a1; font-weight: bold;">Taip Nama Haiwan:</p>
        <input type="text" id="animalCmd" placeholder="Kucing, Lembu, dll..." oninput="handleCommand()">
    </div>
    <div class="animal-row">
        <span class="animal-icon" onclick="openApp('KUCING')">🐱</span>
        <span class="animal-icon" onclick="openApp('ANJING')">🐕</span>
        <span class="animal-icon" onclick="openApp('LEMBU')">🐄</span>
        <span class="animal-icon" onclick="openApp('KAMBING')">🐐</span>
        <span class="animal-icon" onclick="openApp('AYAM')">🐓</span>
    </div>
</div>

<!-- Modal Rawatan -->
<div id="treatmentModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Rawatan</h2>
        <div class="symptom-grid">
            <div class="sym-box" onclick="toggleSym(this, 'Cacing')">Cacing</div>
            <div class="sym-box" onclick="toggleSym(this, 'Pernafasan')">Selsema</div>
            <div class="sym-box" onclick="toggleSym(this, 'Kulit')">Kurap</div>
            <div class="sym-box" onclick="toggleSym(this, 'Cirit')">Cirit</div>
        </div>
        <div id="medListSection" style="display:none;">
            <div id="medOptions"></div>
        </div>
        <div id="calcArea">
            <div class="input-row"><label>Berat Haiwan (kg):</label><input type="number" id="weight"></div>
            <div class="input-row"><label>Dose Diperlukan (mg/kg):</label><input type="number" id="dose_req"></div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="str_mg" placeholder="mg/ml" oninput="autoClear('pct')">
                <input type="number" id="str_pct" placeholder="%" oninput="autoClear('mg')">
            </div>
            <button class="btn btn-kira" onclick="calculateDosage()">KIRA SEKARANG</button>
        </div>
        <button class="btn btn-tutup" onclick="closeApp()">TUTUP</button>
    </div>
</div>

<!-- POP-UP JAWAPAN TEMA BIRU -->
<div id="customAlert">
    <h2>HASIL KIRAAN</h2>
    <div id="alertMessage">0.00 ml</div>
    <button class="btn" onclick="closeAlert()">OK</button>
</div>

<script>
    let selectedAnimal = "";
    let activeSymptoms = [];
    const medicineDb = {
        'KUCING': {'Cacing': ['Drontal Cat', 'Zantel'], 'Pernafasan': ['Doxycycline'], 'Kulit': ['Ketoconazole'], 'Cirit': ['Norit']},
        'LEMBU': {'Cacing': ['Albendazole', 'Ivermectin'], 'Pernafasan': ['Oxytetracycline LA'], 'Kulit': ['Gusanex'], 'Cirit': ['Electrolyte']},
        'ANJING': {'Cacing': ['Drontal Dog'], 'Pernafasan': ['Amoxicillin'], 'Kulit': ['Bravecto'], 'Cirit': ['Metronidazole']},
        'KAMBING': {'Cacing': ['Albendazole'], 'Pernafasan': ['Tylosin'], 'Kulit': ['Iodine'], 'Cirit': ['Butasyl']},
        'AYAM': {'Cacing': ['Piperazine'], 'Pernafasan': ['Enrofloxacin'], 'Kulit': ['Iodine'], 'Cirit': ['Sulpha-Q']}
    };

    function handleCommand() {
        let input = document.getElementById('animalCmd').value.toUpperCase();
        if(medicineDb[input]) { openApp(input); document.getElementById('animalCmd').value = ""; }
    }
    function openApp(name) { selectedAnimal = name; document.getElementById('modalTitle').innerText = "Rawatan " + name; document.getElementById('treatmentModal').style.display = "block"; resetFields(); }
    function closeApp() { document.getElementById('treatmentModal').style.display = "none"; }
    function toggleSym(el, sym) { el.classList.toggle('active'); if(activeSymptoms.includes(sym)) activeSymptoms = activeSymptoms.filter(i => i !== sym); else activeSymptoms.push(sym); updateMedList(); }
    function updateMedList() {
        const listDiv = document.getElementById('medOptions'); listDiv.innerHTML = "";
        if(activeSymptoms.length === 0) { document.getElementById('medListSection').style.display = "none"; return; }
        activeSymptoms.forEach(s => { if(medicineDb[selectedAnimal][s]) { medicineDb[selectedAnimal][s].forEach(med => {
            let div = document.createElement('div'); div.className = 'med-item'; div.innerText = "[" + s + "] " + med;
            div.onclick = () => { document.getElementById('calcArea').style.display = "block"; }; listDiv.appendChild(div);
        });}});
        document.getElementById('medListSection').style.display = "block";
    }
    function autoClear(type) { if(type === 'pct') document.getElementById('str_pct').value = ""; else document.getElementById('str_mg').value = ""; }
    
    function calculateDosage() {
        const w = parseFloat(document.getElementById('weight').value);
        const d = parseFloat(document.getElementById('dose_req').value);
        const mg = parseFloat(document.getElementById('str_mg').value);
        const pct = parseFloat(document.getElementById('str_pct').value);
        let s = mg > 0 ? mg : pct * 10;
        if(w > 0 && d > 0 && s > 0) {
            let res = ((w * d) / s).toFixed(2) + " ml";
            document.getElementById('alertMessage').innerText = res;
            document.getElementById('customAlert').style.display = "block";
        } else { alert("Sila isi semua maklumat!"); }
    }
    function closeAlert() { document.getElementById('customAlert').style.display = "none"; }
    function resetFields() { activeSymptoms = []; document.querySelectorAll('.sym-box').forEach(b => b.classList.remove('active')); document.getElementById('medListSection').style.display = "none"; document.getElementById('calcArea').style.display = "none"; document.querySelectorAll('input').forEach(i => i.value = ""); }
</script>
</body>
</html>
